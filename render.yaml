version: "1"

# Render Blueprint — https://render.com/docs/infrastructure-as-code
# After the first deploy, set API → CORS_ORIGINS to your web service URL (https://…onrender.com).
# See DEPLOY-RENDER.md for manual steps and troubleshooting.

databases:
  - name: mini-linkedin-db
    databaseName: mini_linkedin_ai
    user: mini_linkedin

services:
  - type: web
    # Must match the Render service name / fromService refs below (your live API host).
    name: pythonapiserver-mini-linkedin-ai
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: mini-linkedin-db
          property: connectionString
      # Comma-separated; must include your Next.js URL, e.g. https://mini-linkedin-web.onrender.com
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: mini-linkedin-web
    runtime: node
    rootDir: frontend
    buildCommand: node scripts/render-build.cjs
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: mini-linkedin-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOW_DB_RESET
        value: "false"
      - key: FASTAPI_BASE_URL
        fromService:
          name: pythonapiserver-mini-linkedin-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_FASTAPI_SSE_ORIGIN
        fromService:
          name: pythonapiserver-mini-linkedin-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL
